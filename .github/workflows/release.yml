name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the .app
# bundle on a clean macOS runner and attach it to a GitHub Release. The curl
# installer (install.sh) pulls the asset from the latest release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Zip the .app
        run: |
          cd dist
          zip -r -y KajiGauge.app.zip KajiGauge.app

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KajiGauge.app.zip
          generate_release_notes: true
